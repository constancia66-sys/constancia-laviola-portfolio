<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constancia Laviola | Directora & Productora Audiovisual</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --accent: #c9a962;
            --accent-light: #e8d5a3;
            --text: #f5f5f5;
            --text-muted: #888;
            --gradient: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Inter', sans-serif;
            background:var(--primary);
            color:var(--text);
            line-height:1.6;
            overflow-x:hidden;
        }

        .lang-selector {
            position:fixed;
            top:2rem;
            right:2rem;
            z-index:1000;
            display:flex;
            gap:0.5rem;
            background:rgba(26,26,26,0.9);
            backdrop-filter:blur(10px);
            padding:0.5rem;
            border-radius:50px;
            border:1px solid rgba(201,169,98,0.3);
        }

        .lang-btn {
            background:transparent;
            border:none;
            color:var(--text-muted);
            padding:0.5rem 1rem;
            cursor:pointer;
            border-radius:25px;
            font-size:0.85rem;
            text-transform:uppercase;
        }

        .lang-btn.active { background:var(--accent); color:var(--primary); }

        .hero {
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:var(--gradient);
            position:relative;
        }

        .hero-content { text-align:center; max-width:900px; padding:2rem; }

        .hero-image {
            width:200px;
            height:200px;
            border-radius:50%;
            object-fit:cover;
            border:3px solid var(--accent);
            margin-bottom:2rem;
        }

        .hero h1 {
            font-family:'Playfair Display', serif;
            font-size:clamp(3rem,8vw,6rem);
            background:linear-gradient(135deg,#fff,var(--accent-light));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .projects { padding:8rem 2rem; background:var(--secondary); }

        .projects-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
            gap:2rem;
        }

        .project-card {
            background:var(--primary);
            border:1px solid rgba(201,169,98,0.1);
            transition:0.3s;
        }

        .project-card:hover {
            transform:translateY(-10px);
            border-color:var(--accent);
        }

        .project-image img {
            width:100%;
            height:250px;
            object-fit:cover;
        }

        .gallery img {
            width:100%;
            height:80px;
            object-fit:cover;
            cursor:pointer;
        }
    </style>
</head>

<body>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<!-- LANG -->
<div class="lang-selector">
    <button class="lang-btn active" onclick="switchLang('es')">ES</button>
    <button class="lang-btn" onclick="switchLang('en')">EN</button>
    <button class="lang-btn" onclick="switchLang('pt')">PT</button>
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <img src="perfil.jpeg" class="hero-image">
        <h1>CONSTANCIA LAVIOLA</h1>
    </div>
</section>

<!-- PROJECTS -->
<section class="projects">
<div class="projects-grid">

    <!-- QOSSP -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/qossp/quando-o-sol-se-poe-poster.png"
                 alt="Quando O Sol Se Põe"
                 onclick="openLightbox(this.src)">
        </div>

        <div class="gallery">
            <img src="assets/assets/assets/projects/qossp/qossp2.jpeg" onclick="openLightbox(this.src)">
            <img src="assets/assets/assets/projects/qossp/qossp3.jpeg" onclick="openLightbox(this.src)">
            <img src="assets/assets/assets/projects/qossp/qossp4.jpeg" onclick="openLightbox(this.src)">
        </div>
    </div>

    <!-- PACTO BRUTAL -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/pacto/pactobrutal0.jpeg">
        </div>
    </div>

    <!-- O PIÃO -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/opiao/opiao0.jpeg">
        </div>
    </div>

    <!-- SEGIDORAS -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/seguidoras/seguidoras1.jpeg">
        </div>
    </div>

    <!-- OLIMPÍADAS -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/olimpiadas/olimpic4.jpeg">
        </div>
    </div>

    <!-- COLdPLAY -->
    <div class="project-card">
        <div class="project-image">
            <img src="assets/assets/assets/projects/coldplay/coldplay.jpeg">
        </div>
    </div>

</div>
</section>

<script>
function openLightbox(src){
    document.getElementById('lightbox').style.display='flex';
    document.getElementById('lightbox-img').src=src;
}

function closeLightbox(){
    document.getElementById('lightbox').style.display='none';
}

function switchLang(lang){
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
}
</script>

</body>
</html>
